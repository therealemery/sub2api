name: Build and Deploy

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build and deploy'
        required: false
        default: 'main'
        type: string

env:
  IMAGE_NAME: ownapi
  IMAGE_TAG: main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            --build-arg GOPROXY=https://goproxy.cn,direct \
            --build-arg GOSUMDB=sum.golang.google.cn \
            --build-arg ALPINE_REPOSITORY_URL=https://mirrors.aliyun.com/alpine \
            -f Dockerfile \
            --load .

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > /tmp/ssh_key
          chmod 600 /tmp/ssh_key
        env:
          SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}

      - name: Save and deploy image
        run: |
          docker save ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} | gzip | ssh -o StrictHostKeyChecking=no -i /tmp/ssh_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} '
            cd /opt/ownapi/deploy
            echo "Loading Docker image..."
            gunzip | docker load
            echo "Restarting ownapi service..."
            docker compose stop ownapi
            docker compose rm -f ownapi
            docker compose up -d ownapi
            echo "Deployment complete!"
            docker compose ps
            docker compose logs --tail=20 ownapi
          '